name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must match vMAJOR.MINOR.PATCH; got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Verify source
        shell: bash
        run: |
          set -euo pipefail
          scripts/check-generated.sh
          gofmt -w .
          go test ./...
          go test ./... -coverprofile=coverage.out
          go tool cover -func=coverage.out
          git diff --check
          git diff --exit-code

      - name: Build CLI artifacts
        shell: bash
        run: |
          set -euo pipefail
          scripts/build-release-artifacts.sh "${GITHUB_REF_NAME#v}" dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            dist/*.tar.gz \
            dist/checksums.txt \
            --title "${GITHUB_REF_NAME}" \
            --notes "tossinvest-go ${GITHUB_REF_NAME}"
